name: CI/CD — Build & Deploy to OKE

# ──────────────────────────────────────────────────────────────
# Triggers: only on push to main (i.e. after a PR is merged).
# Pipeline: lint + security (DevSecOps) → build → deploy to OKE
# Prevents duplicate runs for the same commit via concurrency.
# ──────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true   # cancels any running deploy if a new commit arrives

env:
  IMAGE:      flaviorssilva/aiops
  NAMESPACE:  aiops
  DEPLOYMENT: aiops-agent-app
  CONTAINER:  app
  SMOKE_URL:  https://aiops.dublinconsulting.com.br/api/health
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ── 1. Lint & code quality (DevSecOps guardrail) ─────────────
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check src deploy

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check src deploy

  # ── 2. Security scan — secrets, SAST, dependencies (DevSecOps) ─
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for secret scanning

      - name: Secret leak detection (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python SAST (Bandit)
        run: |
          pip install bandit
          bandit -c pyproject.toml -r src -ll -ii -x tests

      - name: Dependency & filesystem scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true
          trivyignores: .trivyignore

  # ── 3. Build & Push Docker image ─────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: [lint, security]
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image tag  (short SHA)
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_tag=${{ env.IMAGE }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${{ env.IMAGE }}:${SHORT_SHA}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: flaviorssilva
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.image_tag }}
            ${{ env.IMAGE }}:latest
          build-args: |
            DEPS_HASH=${{ hashFiles('pyproject.toml') }}
          # Scope cache to pyproject.toml — avoids stale .venv when deps change
          cache-from: type=gha,scope=${{ hashFiles('pyproject.toml') }}
          cache-to: type=gha,mode=max,scope=${{ hashFiles('pyproject.toml') }}

  # ── 4. Deploy to OKE ─────────────────────────────────────────
  deploy:
    name: Deploy to OKE
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (from GitHub Secret)
        # KUBECONFIG_DATA is a base64-encoded kubeconfig that uses
        # the github-actions service-account token (no OCI CLI needed).
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl -n ${{ env.NAMESPACE }} get deployment ${{ env.DEPLOYMENT }}

      - name: Sync cluster secrets from GitHub Secrets
        run: |
          DB_URL="postgresql+asyncpg://aiops:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/aiops_k8s"
          # Update postgres-credentials (used by the PostgreSQL pod)
          kubectl -n ${{ env.NAMESPACE }} create secret generic postgres-credentials \
            --from-literal=POSTGRES_USER=aiops \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --from-literal=POSTGRES_DB=aiops_k8s \
            --dry-run=client -o yaml | kubectl apply -f -
          # Patch DATABASE_URL, BASIC_AUTH_USER and BASIC_AUTH_PASSWORD into aiops-secrets
          kubectl -n ${{ env.NAMESPACE }} patch secret aiops-secrets \
            --type=merge \
            -p "{\"stringData\":{\"DATABASE_URL\":\"${DB_URL}\",\"BASIC_AUTH_USER\":\"${{ secrets.BASIC_AUTH_USER }}\",\"BASIC_AUTH_PASSWORD\":\"${{ secrets.BASIC_AUTH_PASSWORD }}\",\"GITHUB_TOKEN\":\"${{ secrets.GITOPS_GITHUB_TOKEN }}\"}}"

      - name: Sync GitOps and LLM env vars
        run: |
          # Use set env (not strategic merge on env[]) — merge patch wipes DATABASE_URL and secrets.
          kubectl -n ${{ env.NAMESPACE }} set env deployment/${{ env.DEPLOYMENT }} \
            AGENT_MODEL_NAME=google/gemini-2.5-pro \
            ANTHROPIC_BASE_URL=https://router.requesty.ai/v1 \
            GITOPS_REPO=flaviorssilva1981/guiadodevops \
            GITOPS_WORK_BRANCH=dev \
            GITOPS_DEPLOY_BRANCH=main \
            GITOPS_AUTO_MERGE=false

      - name: Update deployment image
        run: |
          kubectl -n ${{ env.NAMESPACE }} set image \
            deployment/${{ env.DEPLOYMENT }} \
            ${{ env.CONTAINER }}=${{ needs.build.outputs.image_tag }}

      - name: Wait for rollout to complete
        run: |
          kubectl -n ${{ env.NAMESPACE }} rollout status \
            deployment/${{ env.DEPLOYMENT }} \
            --timeout=300s

      - name: Show running pods
        run: |
          kubectl -n ${{ env.NAMESPACE }} get pods \
            -l app=${{ env.DEPLOYMENT }} \
            -o wide

      - name: Smoke test (health endpoint)
        run: |
          echo "Checking ${{ env.SMOKE_URL }}"
          for i in $(seq 1 12); do
            if curl -fsS "${{ env.SMOKE_URL }}" | grep -q '"status":"ok"'; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${i}/12 — waiting 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1
