apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-app-start
  namespace: aiops
data:
  start.sh: |
    #!/bin/bash
    set -euo pipefail
    cd /src
    pip install --no-cache-dir --quiet --force-reinstall .
    exec uvicorn my_agent_app.main:app --host 0.0.0.0 --port 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent-app
  namespace: aiops
  labels:
    app: aiops-agent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent-app
  template:
    metadata:
      labels:
        app: aiops-agent-app
    spec:
      serviceAccountName: aiops-app
      initContainers:
        - name: extract-source
          image: busybox:1.36
          command:
            - sh
            - -c
            - tar xzf /context/context.tgz -C /src
          volumeMounts:
            - name: build-context
              mountPath: /context
            - name: app-source
              mountPath: /src
      containers:
        - name: app
          image: python:3.12-slim-bookworm
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - /scripts/start.sh
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://aiops:aiops123@postgres:5432/aiops_k8s
            - name: MCP_SERVER_URL
              value: http://mcp-server-kubernetes:3001/mcp
            - name: ANTHROPIC_BASE_URL
              value: https://router.requesty.ai
            - name: AGENT_MODEL_NAME
              value: anthropic/claude-sonnet-4-5
            - name: EVENT_COLLECTION_INTERVAL_MINUTES
              value: "3"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: ANTHROPIC_API_KEY
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: BASIC_AUTH_PASSWORD
            # MCP_AUTH_TOKEN not set: MCP server runs auth-free inside the cluster
          volumeMounts:
            - name: app-source
              mountPath: /src
            - name: start-script
              mountPath: /scripts
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: build-context
          configMap:
            name: aiops-app-source
        - name: app-source
          emptyDir: {}
        - name: start-script
          configMap:
            name: aiops-app-start
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-agent-app
  namespace: aiops
  labels:
    app: aiops-agent-app
spec:
  selector:
    app: aiops-agent-app
  ports:
    - name: http
      port: 80
      targetPort: http
