apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent-app
  namespace: aiops
  labels:
    app: aiops-agent-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent-app
  template:
    metadata:
      labels:
        app: aiops-agent-app
    spec:
      serviceAccountName: aiops-app
      containers:
        - name: app
          # CI/CD updates this tag on every push to main
          image: flaviorssilva/aiops:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: DATABASE_URL
            - name: MCP_SERVER_URL
              value: http://mcp-server-kubernetes:3001/mcp
            - name: ANTHROPIC_BASE_URL
              value: https://router.requesty.ai
            - name: AGENT_MODEL_NAME
              value: anthropic/claude-sonnet-4-5
            - name: EVENT_COLLECTION_INTERVAL_MINUTES
              value: "3"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: ANTHROPIC_API_KEY
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: BASIC_AUTH_USER
            - name: BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: BASIC_AUTH_PASSWORD
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: GITHUB_TOKEN
                  optional: true
            - name: GITOPS_REPO
              value: flaviorssilva1981/guiadodevops
            - name: GITOPS_WORK_BRANCH
              value: dev
            - name: GITOPS_DEPLOY_BRANCH
              value: main
            - name: GITOPS_AUTO_MERGE
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-agent-app
  namespace: aiops
  labels:
    app: aiops-agent-app
spec:
  selector:
    app: aiops-agent-app
  ports:
    - name: http
      port: 80
      targetPort: http
